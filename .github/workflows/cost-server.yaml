name: cost-server CI

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - collector-server/cost-server/**
      - .github/workflows/cost-server.yaml
      - deploy/kubernetes/cost-server/**

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        go-version: ["1.26.x"]

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./collector-server/cost-server/go.sum

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('collector-server/cost-server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Local build for CI
        working-directory: ./collector-server/cost-server
        run: |
          go build -o cost-server ./cmd

      - name: GolangCI Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: collector-server/cost-server
          args: --timeout 20m
